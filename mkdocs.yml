site_name: Google MCP Server
site_description: MCP server for reading Google Slides and Docs, built on omniskill for composability
site_url: https://plexusone.github.io/mcp-google
repo_url: https://github.com/plexusone/mcp-google
repo_name: plexusone/mcp-google

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (PlexusOne default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

extra_css:
  - https://plexusone.dev/css/plexusone-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Setup: getting-started/setup.md
      - Quick Start: getting-started/quickstart.md
  - Tools Reference:
      - Overview: tools/overview.md
      - Google Slides: tools/slides.md
      - Google Docs: tools/docs.md
  - Architecture:
      - Overview: architecture/overview.md
      - OmniSkill Integration: architecture/omniskill.md
      - Composability: architecture/composability.md
  - Skills Guide:
      - Using Skills: skills/using-skills.md
      - Building Multi-Service Servers: skills/multi-service.md
  - Configuration:
      - Credentials: configuration/credentials.md
      - Environment Variables: configuration/environment.md
      - Claude Desktop: configuration/claude-desktop.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/plexusone/mcp-google
